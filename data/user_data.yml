paths:
    presto_path: <your install path>/presto/bin #fill in with the location where you cloned the presto repo
    changeo_path: <your install path>/changeo/bin #fill in with the location where you cloned the changeo repo
    igblast_path: <your install path>/ncbi-igblast-1.22.0 #fill in with the location where you installed IgBLAST
    gfold_sif: <your install path>/NanoMAP/data/sif/gfold-1.1.4.sif #fill in with the location where you cloned this repo (if you downloaded the sif file somewhere else, provide that path instead)
    mmseqs_sif: <your install path>/NanoMAP/data/sif/mmseqs2-17.b804f.sif #fill in with the location where you cloned this repo (if you downloaded the sif file somewhere else, provide that path instead)
    R1_primer_file: <your install path>/NanoMAP/data/primers/AlpVHH_R1_primers_05Feb24.fasta #fill in with the location where you cloned this repo (if you're using different forward primers, provide the path to those instead)
    R2_primer_file: <your install path>/NanoMAP/data/primers/AlpVHH_R2_primers_05Feb24.fasta #fill in with the location where you cloned this repo (if you're using different reverse primers, provide the path to those instead)
